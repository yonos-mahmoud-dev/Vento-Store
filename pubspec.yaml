name: vento_store
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  ## -- STATE MANAGEMENT
  provider:
  get_storage:

  ## -- OnBoarding PACKAGES
  liquid_swipe:
  smooth_page_indicator:

  ## -- OTP TEXT FIELD PACKAGE
  otp_text_field:
  flutter_otp_text_field:

  ## -- FIREBASE PACKAGES
  firebase_auth:
  firebase_core:
  google_sign_in:
  cloud_firestore:
  firebase_storage:
  firebase_messaging:
  firebase_crashlytics:

  ## -- ICON PACKAGES
  iconsax:
  line_awesome_flutter:
  ## -- Utility PACKAGES
  intl:
  logger:
  lottie:
  badges:
  shimmer:
  readmore:
  image_picker:
  url_launcher:
  carousel_slider:
  connectivity_plus:
  country_code_picker:
  flutter_native_splash:

  # Notification
  # flutter_local_notifications:

  supabase_flutter:

  http:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/logo/
    - assets/icons/
    - assets/images/onboarding/
    - assets/images/banners/
    - assets/images/products/

  # example:
  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Thin.ttf
          weight: 100
        - asset: assets/fonts/NotoSans-Light.ttf
          weight: 200
        - asset: assets/fonts/NotoSans-ExtraLight.ttf
          weight: 300
        - asset: assets/fonts/NotoSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/NotoSans-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/NotoSans-Black.ttf
          weight: 900
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
